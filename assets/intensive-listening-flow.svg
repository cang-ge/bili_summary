<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Inter', 'Noto Sans SC', 'PingFang SC', sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="48" fill="#f8fafc" font-size="20" font-weight="700">精听 · 5 步流程</text>
  <text x="40" y="68" fill="#94a3b8" font-size="11">Intensive Listening · 听力提分唯一方法</text>

  <!-- Start -->
  <g transform="translate(450, 110)">
    <ellipse cx="0" cy="0" rx="60" ry="22" fill="rgba(124,58,237,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="0" y="4" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">开始 · 单句播放</text>
  </g>

  <!-- Arrow down -->
  <line x1="450" y1="135" x2="450" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1 -->
  <g transform="translate(450, 200)">
    <rect x="-110" y="-25" width="220" height="50" rx="8" fill="#0f172a"/>
    <rect x="-110" y="-25" width="220" height="50" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="0" y="-5" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">Step 1 · 听第 1 遍</text>
    <text x="0" y="12" fill="#94a3b8" font-size="10" text-anchor="middle">感受整体结构，不看译文</text>
  </g>

  <line x1="450" y1="225" x2="450" y2="260" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <g transform="translate(450, 290)">
    <rect x="-110" y="-25" width="220" height="50" rx="8" fill="#0f172a"/>
    <rect x="-110" y="-25" width="220" height="50" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="0" y="-5" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">Step 2 · 听第 2 遍</text>
    <text x="0" y="12" fill="#94a3b8" font-size="10" text-anchor="middle">聚焦听不懂的部分</text>
  </g>

  <line x1="450" y1="315" x2="450" y2="350" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <g transform="translate(450, 380)">
    <rect x="-110" y="-25" width="220" height="50" rx="8" fill="#0f172a"/>
    <rect x="-110" y="-25" width="220" height="50" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="0" y="-5" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">Step 3 · 听第 3 遍</text>
    <text x="0" y="12" fill="#94a3b8" font-size="10" text-anchor="middle">每遍都比上遍更清晰，这就是进步</text>
  </g>

  <!-- Decision diamond: Understood? -->
  <g transform="translate(450, 470)">
    <polygon points="0,-32 70,0 0,32 -70,0" fill="#0f172a"/>
    <polygon points="0,-32 70,0 0,32 -70,0" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="0" y="-2" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">3 遍后听懂？</text>
  </g>

  <!-- Branch: Yes → done -->
  <line x1="520" y1="470" x2="700" y2="470" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="610" y="462" fill="#34d399" font-size="11" font-weight="600" text-anchor="middle">是</text>
  <g transform="translate(770, 470)">
    <rect x="-60" y="-22" width="120" height="44" rx="8" fill="#0f172a"/>
    <rect x="-60" y="-22" width="120" height="44" rx="8" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1.5"/>
    <text x="0" y="-3" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">✓ 通过</text>
    <text x="0" y="13" fill="#a7f3d0" font-size="9" text-anchor="middle">进入下一句</text>
  </g>

  <!-- Branch: No → read translation -->
  <line x1="450" y1="502" x2="450" y2="538" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="465" y="525" fill="#fb7185" font-size="11" font-weight="600">否</text>

  <g transform="translate(450, 568)">
    <rect x="-140" y="-22" width="280" height="44" rx="8" fill="#0f172a"/>
    <rect x="-140" y="-22" width="280" height="44" rx="8" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
    <text x="0" y="-3" fill="#f8fafc" font-size="11" font-weight="600" text-anchor="middle">Step 4 · 打开译文，对照听</text>
    <text x="0" y="13" fill="#fda4af" font-size="9" text-anchor="middle">再听 → 还不懂 → 语法分析</text>
  </g>

  <!-- Side annotation: arrow from step 3 to diamond -->
  <line x1="450" y1="408" x2="450" y2="438" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer hint -->
  <g transform="translate(40, 575)">
    <rect x="0" y="0" width="200" height="32" rx="6" fill="rgba(124,58,237,0.1)" stroke="#a78bfa" stroke-width="0.8"/>
    <text x="100" y="20" fill="#a78bfa" font-size="10" font-weight="600" text-anchor="middle">语法是基础</text>
  </g>
</svg>