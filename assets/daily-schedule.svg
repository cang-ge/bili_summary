<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'Inter', 'Noto Sans SC', 'PingFang SC', sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="morningGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="rgba(124,58,237,0.5)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0.5)"/>
    </linearGradient>
    <linearGradient id="afternoonGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="rgba(5,150,105,0.5)"/>
      <stop offset="100%" stop-color="rgba(16,185,129,0.5)"/>
    </linearGradient>
    <linearGradient id="eveningGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="rgba(217,119,6,0.5)"/>
      <stop offset="100%" stop-color="rgba(245,158,11,0.5)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="48" fill="#f8fafc" font-size="20" font-weight="700">雅思自学 · 每日作息表</text>
  <text x="40" y="68" fill="#94a3b8" font-size="11">Daily Schedule / 13 小时高效备考</text>

  <!-- Time scale axis -->
  <line x1="40" y1="120" x2="860" y2="120" stroke="#334155" stroke-width="1"/>
  <g font-size="9" fill="#64748b" text-anchor="middle">
    <text x="80" y="115">09:00</text>
    <text x="210" y="115">12:00</text>
    <text x="290" y="115">13:30</text>
    <text x="420" y="115">15:00</text>
    <text x="600" y="115">17:30</text>
    <text x="700" y="115">19:00</text>
    <text x="840" y="115">22:00</text>
  </g>

  <!-- Block 1: 09:00-12:00 Vocabulary (purple - morning) -->
  <rect x="80" y="160" width="260" height="80" rx="8" fill="#0f172a"/>
  <rect x="80" y="160" width="260" height="80" rx="8" fill="url(#morningGrad)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="100" y="186" fill="#f8fafc" font-size="13" font-weight="600">背单词 · 复习 · 过单词</text>
  <text x="100" y="206" fill="#c4b5fd" font-size="10">100-150 新词 + 复习 150-200</text>
  <text x="100" y="224" fill="#94a3b8" font-size="9">早上第一件事不许碰手机</text>

  <!-- Block 2: 12:00-13:30 Lunch (slate) -->
  <rect x="350" y="160" width="100" height="80" rx="8" fill="#0f172a"/>
  <rect x="350" y="160" width="100" height="80" rx="8" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="190" fill="#f8fafc" font-size="12" font-weight="600" text-anchor="middle">午餐</text>
  <text x="400" y="208" fill="#cbd5e1" font-size="9" text-anchor="middle">+ 5 分钟午睡</text>
  <text x="400" y="225" fill="#94a3b8" font-size="8" text-anchor="middle">提神</text>

  <!-- Block 3: 13:30-15:00 Listening+Reading (emerald) -->
  <rect x="460" y="160" width="160" height="80" rx="8" fill="#0f172a"/>
  <rect x="460" y="160" width="160" height="80" rx="8" fill="url(#afternoonGrad)" stroke="#34d399" stroke-width="1.5"/>
  <text x="478" y="186" fill="#f8fafc" font-size="13" font-weight="600">听力 + 阅读</text>
  <text x="478" y="206" fill="#a7f3d0" font-size="10">完整一套机考</text>
  <text x="478" y="224" fill="#94a3b8" font-size="9">下午时段形成节奏</text>

  <!-- Block 4: 15:00-17:30 Review (emerald darker) -->
  <rect x="630" y="160" width="180" height="80" rx="8" fill="#0f172a"/>
  <rect x="630" y="160" width="180" height="80" rx="8" fill="rgba(6,78,59,0.6)" stroke="#10b981" stroke-width="1.5"/>
  <text x="648" y="186" fill="#f8fafc" font-size="13" font-weight="600">复盘 + 精听</text>
  <text x="648" y="206" fill="#a7f3d0" font-size="10">单句精听 · 错题归档</text>
  <text x="648" y="224" fill="#94a3b8" font-size="9">用飞书 / Excel 记录</text>

  <!-- Block 5: 17:30-19:00 Dinner (slate) -->
  <rect x="80" y="280" width="220" height="60" rx="8" fill="#0f172a"/>
  <rect x="80" y="280" width="220" height="60" rx="8" fill="rgba(30,41,59,0.6)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="304" fill="#f8fafc" font-size="13" font-weight="600">晚饭 + 休息</text>
  <text x="100" y="324" fill="#cbd5e1" font-size="10">离开学习环境，切换状态</text>

  <!-- Block 6: 19:00-22:00 Writing (amber - evening) -->
  <rect x="320" y="280" width="490" height="60" rx="8" fill="#0f172a"/>
  <rect x="320" y="280" width="490" height="60" rx="8" fill="url(#eveningGrad)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="340" y="304" fill="#f8fafc" font-size="13" font-weight="600">写作 + AI 改作文 + 看课程</text>
  <text x="340" y="324" fill="#fde68a" font-size="10">保持模板 · 让 AI 升级到下一档 · 不直接写 9 分给你</text>

  <!-- Legend -->
  <g transform="translate(40, 400)">
    <text x="0" y="0" fill="#94a3b8" font-size="10" font-weight="600">时段色系</text>

    <rect x="0" y="14" width="14" height="14" rx="2" fill="rgba(124,58,237,0.5)" stroke="#a78bfa"/>
    <text x="22" y="25" fill="#cbd5e1" font-size="10">上午 · 输入（词汇）</text>

    <rect x="180" y="14" width="14" height="14" rx="2" fill="rgba(5,150,105,0.5)" stroke="#34d399"/>
    <text x="202" y="25" fill="#cbd5e1" font-size="10">下午 · 练习 + 复盘</text>

    <rect x="380" y="14" width="14" height="14" rx="2" fill="rgba(217,119,6,0.5)" stroke="#fbbf24"/>
    <text x="402" y="25" fill="#cbd5e1" font-size="10">晚上 · 输出（写作）</text>

    <rect x="560" y="14" width="14" height="14" rx="2" fill="rgba(30,41,59,0.6)" stroke="#94a3b8"/>
    <text x="582" y="25" fill="#cbd5e1" font-size="10">休息 / 切换</text>
  </g>

  <!-- Key insight -->
  <g transform="translate(40, 470)">
    <rect x="0" y="0" width="820" height="50" rx="6" fill="rgba(124,58,237,0.08)" stroke="#a78bfa" stroke-width="0.8"/>
    <text x="20" y="22" fill="#a78bfa" font-size="11" font-weight="600">▍ 关键洞察</text>
    <text x="20" y="40" fill="#cbd5e1" font-size="10">报考时段跟着练习时段走，让大脑在固定时段自动进入「考试模式」。</text>
  </g>
</svg>